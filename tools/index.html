<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outils - TopGirl Fansite</title>
  <meta name="description" content="Outils exclusifs pour TopGirl : calculateur de ressources et plus.">
  <link rel="stylesheet" href="/assets/css/styles.css">
  
  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    .artist-select {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--space-3);
      margin-top: var(--space-4);
    }
    .artist-option {
      padding: var(--space-3);
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition-base);
      text-align: left;
    }
    .artist-option:hover {
      border-color: var(--primary);
    }
    .artist-option.selected {
      border-color: var(--primary);
      background: rgba(139, 92, 246, 0.1);
    }
    .artist-option h4 {
      margin-bottom: var(--space-1);
      font-size: var(--text-sm);
    }
    .artist-option .meta {
      font-size: var(--text-xs);
      color: var(--text-muted);
    }
    .artist-option .skill-info {
      font-size: var(--text-xs);
      color: var(--primary);
      margin-top: var(--space-1);
    }
    .team-result {
      margin-top: var(--space-6);
      padding: var(--space-5);
      background: var(--bg-card);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
    }
    .team-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: var(--space-3);
    }
    .team-stat {
      background: var(--bg-subtle);
      padding: var(--space-3);
      border-radius: var(--radius);
      text-align: center;
    }
    .team-stat .value {
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--primary);
    }
    .team-stat .label {
      font-size: var(--text-xs);
      color: var(--text-muted);
    }
    .artist-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--space-4);
    }
    @media (max-width: 1200px) { .artist-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 900px) { .artist-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px) { .artist-grid { grid-template-columns: repeat(2, 1fr); } }
    .artist-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      border: 2px solid var(--border);
      padding: var(--space-4);
      transition: all var(--transition-base);
      cursor: pointer;
      text-align: center;
    }
    .artist-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
    }
    .artist-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--bg-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-xl);
      font-weight: 700;
      margin: 0 auto var(--space-3);
    }
    .artist-card-name {
      font-weight: 600;
      font-size: var(--text-sm);
      margin-bottom: var(--space-1);
    }
    .artist-card-rank {
      font-size: var(--text-xs);
      padding: 2px 8px;
      border-radius: var(--radius-full);
      display: inline-block;
      margin-bottom: var(--space-2);
    }
    .artist-card-meta {
      font-size: var(--text-xs);
      color: var(--text-muted);
    }
    .artist-dropdown {
      width: 100%;
      padding: var(--space-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-subtle);
      color: var(--text-primary);
      font-size: var(--text-xs);
      cursor: pointer;
      margin-top: var(--space-2);
    }
    .rank-UR { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
    .rank-SSR { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
    .rank-SR { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    .rank-R { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .rank-N { background: rgba(100, 116, 139, 0.2); color: #94a3b8; }
    .svs-items {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .svs-item-row {
      display: grid;
      grid-template-columns: 1fr auto 100px;
      gap: var(--space-4);
      align-items: center;
      padding: var(--space-3) var(--space-4);
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .svs-item-name {
      font-weight: 500;
      font-size: var(--text-sm);
    }
    .svs-item-cost {
      color: var(--accent-yellow);
      font-weight: 600;
      font-size: var(--text-sm);
    }
    .svs-qty {
      width: 80px;
      padding: var(--space-2) var(--space-3);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-subtle);
      color: var(--text-primary);
      font-size: var(--text-base);
      text-align: center;
    }
    .svs-qty:focus {
      outline: none;
      border-color: var(--primary);
    }
    .svs-total {
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--accent-yellow);
    }
    #toolContent {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      border: 1px solid var(--border);
    }
    #toolContent iframe {
      display: block;
      border-radius: var(--radius);
      overflow: hidden;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <div class="logo-icon">AG</div>
        <span>TopGirl</span>
      </a>
      <nav class="nav">
        <a href="/">Accueil</a>
        <a href="/database/">Base de Données</a>
        <a href="/events/">Événements</a>
        <a href="/guides/">Guides</a>
        <a href="/tools/" class="active">Outils</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <h1 class="section-title" style="margin-bottom: var(--space-2);">Outils</h1>
      <p class="section-subtitle" style="margin-bottom: var(--space-6);">Optimisez votre gameplay avec nos outils</p>
      
      <!-- Ad Banner Top -->
      <div class="ad-banner" style="margin-bottom: var(--space-6);">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-5737915177617454"
             data-ad-slot="1234567890"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
      
      <div class="tabs" style="margin-bottom: var(--space-6);">
        <button class="tab active" data-tab="calculator">Calculateur</button>
        <button class="tab" data-tab="team">Équipe</button>
        <button class="tab" data-tab="database">Artistes</button>
        <button class="tab" data-tab="ceo">CEO</button>
        <button class="tab" data-tab="svs">SVS</button>
      </div>

      <div id="toolContent">
        <div style="background: var(--bg-dark); border-radius: var(--radius); overflow: hidden;">
          <iframe 
            src="https://apexgirlcalc.vercel.app" 
            style="width: 100%; height: 700px; border: none;"
            title="Calculateur de ressources"
          ></iframe>
        </div>
      </div>
      
      <!-- Ad Banner Bottom -->
      <div class="ad-banner" style="margin-top: var(--space-6);">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-5737915177617454"
             data-ad-slot="1234567890"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div>
        <h4>TopGirl Fansite</h4>
        <p class="text-sm text-muted">Le fansite non officiel de TopGirl/ApexGirl par A3Games.</p>
      </div>
      <div>
        <h4>Navigation</h4>
        <a href="/">Accueil</a>
        <a href="/database/">Base de Données</a>
        <a href="/guides/">Guides</a>
        <a href="/tools/">Outils</a>
      </div>
    </div>
    <div class="footer-bottom">
      © 2026 TopGirl Fansite. Tous droits réservés.
    </div>
  </footer>

  <script>
    function calculateSVS() {
      const inputs = document.querySelectorAll('.svs-qty');
      let total = 0;
      
      inputs.forEach(input => {
        const qty = parseInt(input.value || 0);
        const cost = parseInt(input.dataset.cost || 0);
        total += qty * cost;
      });
      
      document.getElementById('svsTotal').textContent = `${total.toLocaleString()} pièces`;
    }

    function getRankColor(rank) {
      const colors = {
        'UR': '#fbbf24',
        'SSR': '#a855f7',
        'SR': '#3b82f6',
        'R': '#22c55e',
        'N': '#94a3b8'
      };
      return colors[rank] || '#94a3b8';
    }

    function getArtistStats(artist) {
      const skillCategories = artist.skillCategories || { dps: [], offensive: [], hp: [], defense: [], speed: [] };
      
      const stats = {
        flatDmg: 0,
        skillBonus: 0,
        fanCapacity: 0,
        defense: 0,
        speed: 0,
        utility: 0,
        rawDps: 0
      };

      return stats;
    }

    function parsePercentage(skill) {
      const match = skill.match(/(\d+)%/);
      return match ? parseInt(match[1]) : 0;
    }

    function getFlatDamage(rank) {
      const damage = { 'UR': 1800, 'SSR': 1200, 'SR': 800, 'R': 500, 'N': 300 };
      return damage[rank] || 500;
    }

    let dbArtists = [];

    async function initArtistDatabase() {
      const results = document.getElementById('dbResults');
      
      try {
        const response = await fetch('/database/data/artists.json');
        const artists = await response.json();
        dbArtists = artists;
        
        renderDbArtists(artists);
        
        document.getElementById('dbSearch')?.addEventListener('input', filterDbArtists);
        document.getElementById('dbRole')?.addEventListener('change', filterDbArtists);
        document.getElementById('dbRank')?.addEventListener('change', filterDbArtists);
      } catch (error) {
        results.innerHTML = '<p class="text-muted text-center">Erreur lors du chargement</p>';
      }
    }

    function filterDbArtists() {
      const search = document.getElementById('dbSearch')?.value.toLowerCase() || '';
      const role = document.getElementById('dbRole')?.value || '';
      const rank = document.getElementById('dbRank')?.value || '';
      
      let filtered = dbArtists.filter(artist => {
        if (search && !artist.name?.toLowerCase().includes(search)) return false;
        if (role && artist.position !== role) return false;
        if (rank && artist.rank !== rank) return false;
        return true;
      });
      
      renderDbArtists(filtered);
    }

    function renderDbArtists(artists) {
      const results = document.getElementById('dbResults');
      
      if (!results) return;
      
      if (artists.length === 0) {
        results.innerHTML = '<p class="text-center text-muted" style="padding: var(--space-8);">Aucun artiste trouvé</p>';
        return;
      }
      
      results.innerHTML = `
        <div class="artist-grid">
          ${artists.map(artist => {
            const skills = artist.skills || [];
            const rankClass = 'rank-' + artist.rank;
            
            return `
              <div class="artist-card">
                <div class="artist-avatar" style="color: ${getRankColor(artist.rank)}">${artist.name?.charAt(0) || '?'}</div>
                <div class="artist-card-name" style="color: ${getRankColor(artist.rank)}">${artist.name}</div>
                <span class="artist-card-rank ${rankClass}">${artist.rank}</span>
                <div class="artist-card-meta">${artist.position} • ${artist.group}</div>
                <select class="artist-dropdown" onchange="event.stopPropagation()">
                  <option value="">Compétences</option>
                  ${skills.map(skill => `<option value="${skill}">${skill}</option>`).join('')}
                </select>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        const toolContent = document.getElementById('toolContent');
        if (tab.dataset.tab === 'calculator') {
          toolContent.innerHTML = `
            <div style="background: var(--bg-dark); border-radius: var(--radius); overflow: hidden;">
              <iframe 
                src="https://apexgirlcalc.vercel.app" 
                style="width: 100%; height: 700px; border: none;"
                title="Calculateur de ressources"
              ></iframe>
            </div>
          `;
        } else if (tab.dataset.tab === 'team') {
          toolContent.innerHTML = `
            <div class="card" style="padding: var(--space-6);">
              <h2 style="margin-bottom: var(--space-2);">Optimiseur d'Équipe</h2>
              <p class="text-muted" style="margin-bottom: var(--space-6);">Sélectionnez vos artistes pour voir les synergies.</p>
              
              <div class="form-group">
                <label class="text-sm text-muted">Rechercher</label>
                <input type="text" id="artistSearch" placeholder="Nom de l'artiste...">
              </div>
               
              <div class="artist-select" id="artistSelect">
                <p class="text-muted text-center" style="padding: var(--space-8);">Chargement...</p>
              </div>
               
              <div class="team-result" id="teamResult" style="display: none;">
                <h3 style="margin-bottom: var(--space-4);">Statistiques de l'équipe</h3>
                <div class="team-stats" id="teamStats"></div>
              </div>
            </div>
          `;
          initTeamOptimizer();
        } else if (tab.dataset.tab === 'database') {
          toolContent.innerHTML = `
            <div class="card" style="padding: var(--space-6);">
              <h2 style="margin-bottom: var(--space-2);">Artistes</h2>
              <p class="text-muted" style="margin-bottom: var(--space-6);">Filtrez et parcourez tous les artistes.</p>
              
              <div class="flex gap-4" style="flex-wrap: wrap; margin-bottom: var(--space-6);">
                <input type="text" id="dbSearch" placeholder="Rechercher..." style="flex: 1; min-width: 150px;">
                <select id="dbRank">
                  <option value="">Tous les rangs</option>
                  <option value="UR">UR</option>
                  <option value="SSR">SSR</option>
                  <option value="SR">SR</option>
                  <option value="R">R</option>
                  <option value="N">N</option>
                </select>
                <select id="dbRole">
                  <option value="">Tous les rôles</option>
                  <option value="Center">Center</option>
                  <option value="Dancer">Dancer</option>
                  <option value="Singer">Singer</option>
                  <option value="Visual">Visual</option>
                </select>
              </div>
               
              <div id="dbResults">
                <p class="text-center text-muted" style="padding: var(--space-8);">Chargement...</p>
              </div>
            </div>
          `;
          initArtistDatabase();
        } else if (tab.dataset.tab === 'ceo') {
          toolContent.innerHTML = `
            <div style="background: var(--bg-dark); border-radius: var(--radius); overflow: hidden;">
              <iframe 
                src="https://ceoevents.vercel.app" 
                style="width: 100%; height: 700px; border: none;"
                title="Calculateur CEO"
              ></iframe>
            </div>
          `;
        } else if (tab.dataset.tab === 'svs') {
          toolContent.innerHTML = `
            <div class="card" style="padding: var(--space-6);">
              <h2 style="margin-bottom: var(--space-2);">Calculateur SVS</h2>
              <p class="text-muted" style="margin-bottom: var(--space-6);">Planifiez vos dépenses de pièces.</p>
               
              <div class="svs-items">
                <div class="svs-item-row">
                  <span class="svs-item-name">UR Artist Selector</span>
                  <span class="svs-item-cost">5000 pièces</span>
                  <input type="number" class="svs-qty" data-cost="5000" min="0" value="0">
                </div>
                <div class="svs-item-row">
                  <span class="svs-item-name">SSR Artist Selector</span>
                  <span class="svs-item-cost">2000 pièces</span>
                  <input type="number" class="svs-qty" data-cost="2000" min="0" value="0">
                </div>
                <div class="svs-item-row">
                  <span class="svs-item-name">SR Artist Selector</span>
                  <span class="svs-item-cost">500 pièces</span>
                  <input type="number" class="svs-qty" data-cost="500" min="0" value="0">
                </div>
                <div class="svs-item-row">
                  <span class="svs-item-name">R Artist Selector</span>
                  <span class="svs-item-cost">150 pièces</span>
                  <input type="number" class="svs-qty" data-cost="150" min="0" value="0">
                </div>
                <div class="svs-item-row">
                  <span class="svs-item-name">10x Pull (SSR+)</span>
                  <span class="svs-item-cost">2500 pièces</span>
                  <input type="number" class="svs-qty" data-cost="2500" min="0" value="0">
                </div>
                <div class="svs-item-row">
                  <span class="svs-item-name">Memory Boost</span>
                  <span class="svs-item-cost">800 pièces</span>
                  <input type="number" class="svs-qty" data-cost="800" min="0" value="0">
                </div>
                <div class="svs-item-row">
                  <span class="svs-item-name">Evolution Material</span>
                  <span class="svs-item-cost">300 pièces</span>
                  <input type="number" class="svs-qty" data-cost="300" min="0" value="0">
                </div>
                <div class="svs-item-row">
                  <span class="svs-item-name">Gold Pack</span>
                  <span class="svs-item-cost">1000 pièces</span>
                  <input type="number" class="svs-qty" data-cost="1000" min="0" value="0">
                </div>
              </div>
               
              <div style="margin-top: var(--space-6); padding-top: var(--space-4); border-top: 1px solid var(--border);">
                <div class="flex justify-between items-center">
                  <h3 style="margin: 0;">Total</h3>
                  <span class="svs-total" id="svsTotal">0 pièces</span>
                </div>
              </div>
            </div>
          `;
          
          document.querySelectorAll('.svs-qty').forEach(input => {
            input.addEventListener('input', calculateSVS);
          });
        }
      });
    });

    let selectedArtists = [];
    let allArtistsData = [];

    async function initTeamOptimizer() {
      const select = document.getElementById('artistSelect');
      const search = document.getElementById('artistSearch');
      
      try {
        const response = await fetch('/database/data/artists.json');
        const artists = await response.json();
        allArtistsData = artists;
        
        renderArtists(artists);
        
        search?.addEventListener('input', (e) => {
          const term = e.target.value.toLowerCase();
          const filtered = artists.filter(a => a.name?.toLowerCase().includes(term));
          renderArtists(filtered);
        });
      } catch (error) {
        select.innerHTML = '<p class="text-muted">Erreur lors du chargement</p>';
      }
    }

    function renderArtists(artists) {
      const select = document.getElementById('artistSelect');
      if (!select) return;
      
      select.innerHTML = artists.slice(0, 20).map(artist => `
        <div class="artist-option" onclick="toggleArtist(${artist.id})">
          <h4 style="color: ${getRankColor(artist.rank)}">${artist.name}</h4>
          <div class="meta">${artist.rank} • ${artist.position}</div>
          <div class="skill-info">${artist.skills?.[0] || ''}</div>
        </div>
      `).join('');
    }

    function toggleArtist(id) {
      const artist = allArtistsData.find(a => a.id === id);
      if (!artist) return;
      
      const idx = selectedArtists.findIndex(a => a.id === id);
      if (idx > -1) {
        selectedArtists.splice(idx, 1);
      } else if (selectedArtists.length < 5) {
        selectedArtists.push(artist);
      }
      
      updateTeamStats();
    }

    function updateTeamStats() {
      const result = document.getElementById('teamResult');
      const stats = document.getElementById('teamStats');
      
      if (selectedArtists.length === 0) {
        result.style.display = 'none';
        return;
      }
      
      result.style.display = 'block';
      
      const totalStats = selectedArtists.reduce((acc, artist) => {
        const artistStats = getArtistStats(artist);
        return {
          damage: acc.damage + artistStats.flatDmg + (artistStats.skillBonus * 10),
          fan: acc.fan + artistStats.fanCapacity,
          defense: acc.defense + artistStats.defense,
          speed: acc.speed + artistStats.speed
        };
      }, { damage: 0, fan: 0, defense: 0, speed: 0 });
      
      stats.innerHTML = `
        <div class="team-stat">
          <div class="value">${selectedArtists.length}</div>
          <div class="label">Artistes</div>
        </div>
        <div class="team-stat">
          <div class="value">${totalStats.damage.toLocaleString()}</div>
          <div class="label">Damage</div>
        </div>
        <div class="team-stat">
          <div class="value">+${totalStats.fan}%</div>
          <div class="label">Fan Cap</div>
        </div>
        <div class="team-stat">
          <div class="value">+${totalStats.defense}%</div>
          <div class="label">Defense</div>
        </div>
      `;
    }
  </script>
</body>
</html>
